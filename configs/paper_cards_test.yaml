# ExaForge — Paper card extraction example
#
# Extracts model cards from a directory of parsed scientific papers
# using vLLM instances spawned by Aegis on Aurora.
#
# Usage:
#   exaforge run --config configs/paper_cards.yaml

aegis:
    # Path to an Aegis YAML config file (required when auto_launch is true)
    config_path: /home/ogokdemir/ExaForge/configs/aegis_configs/single_file.yaml
    auto_launch: true
    wait_for_endpoints: true
    endpoints_file: /home/ogokdemir/ExaForge/aegis_endpoints.txt

task:
    name: card_extraction
    mode: model_card                # model_card | agent_card | data_card
    system_prompt: >-
        You are a helpful assistant specialised in analysing
        scientific texts for bioinformatics workflows.
    temperature: 0.0
    max_tokens: 4000

reader:
    name: text_directory
    input_dir: /lus/flare/projects/LUCID/ogokdemir/data/SC/SC-Parsed
    glob_patterns:
        - "*.mmd"

writer:
    name: jsonl
    output_dir: /lus/flare/projects/LUCID/ogokdemir/data/SC/SC-Model-Cards/cards
    buffer_size: 8
    base_name: model_cards

client:
    # Global in-flight request cap across ALL endpoints combined.
    # Rule of thumb for production: num_endpoints × desired_queue_depth
    # e.g. 12 endpoints × 16 = 192. For this test run 64 is fine.
    max_concurrent_requests: 64
    timeout: 300
    max_retries: 3
    retry_backoff: 2.0
    load_balance_strategy: round_robin

monitor:
    log_file: /lus/flare/projects/LUCID/ogokdemir/data/SC/SC-Model-Cards/run.log
    progress_interval: 30
    enable_rich: true

checkpoint:
    enabled: true
    checkpoint_file: /lus/flare/projects/LUCID/ogokdemir/data/SC/SC-Model-Cards/checkpoint.json

max_items: 128  # test mode — remove or set to 0 to process all papers
